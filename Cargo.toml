[workspace]
resolver = "3"
members = [
    "apps/gpui-smoke",
    "crates/umux-app",
    "crates/umux-browser",
    "crates/umux-cli",
    "crates/umux-config",
    "crates/umux-core",
    "crates/umux-ipc",
    "crates/umux-notify",
    "crates/umux-session",
    "crates/umux-terminal",
    "crates/umux-ui",
    "crates/umux-ui-kit",
    "crates/umux-win32",
    "apps/umux",
    "apps/umux-cli",
]
default-members = [
    "crates/umux-app",
    "crates/umux-browser",
    "crates/umux-cli",
    "crates/umux-config",
    "crates/umux-core",
    "crates/umux-ipc",
    "crates/umux-notify",
    "crates/umux-session",
    "crates/umux-terminal",
    "crates/umux-ui",
    "crates/umux-ui-kit",
    "crates/umux-win32",
    "apps/umux",
    "apps/umux-cli",
    "apps/gpui-smoke",
]

[workspace.package]
edition = "2024"
license = "GPL-3.0-or-later"
publish = false
rust-version = "1.95"

[workspace.dependencies]
alacritty_terminal = "0.26.0"
anyhow = "1.0.86"
ashpd = { version = "0.13", default-features = false, features = ["async-io", "notification", "open_uri", "file_chooser", "settings", "trash"] }
async-channel = "2.5.0"
async-compression = { version = "0.4", features = ["bzip2", "gzip", "futures-io"] }
async-fs = "2.1"
async-tar = "0.5.1"
async-task = "4.7"
async_zip = { version = "0.0.18", features = ["deflate", "deflate64"] }
backtrace = "0.3"
bitflags = "2.6.0"
bytes = "1.0"
camino = "1.2"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4.5", features = ["derive"] }
collections = { path = "vendor/gpui/crates/collections" }
cocoa = "=0.26.0"
cocoa-foundation = "=0.2.0"
core-foundation = "=0.10.0"
core-foundation-sys = "0.8.6"
core-video = { version = "0.5.2", features = ["metal"] }
criterion = { version = "0.5", features = ["html_reports"] }
crossbeam-channel = "0.5"
ctor = "0.4.0"
derive_more = { version = "2.1.1", features = ["add", "add_assign", "deref", "deref_mut", "display", "from_str", "mul", "mul_assign", "not"] }
derive_refineable = { path = "vendor/gpui/crates/derive_refineable" }
dirs = "6.0"
dunce = "1.0"
env_logger = "0.11"
futures = "0.3.32"
futures-concurrency = "7.7.1"
futures-lite = "1.13"
git2 = { version = "0.20.1", default-features = false, features = ["vendored-libgit2"] }
globset = "0.4"
gpui = { path = "vendor/gpui/crates/gpui", default-features = false }
gpui_linux = { path = "vendor/gpui/crates/gpui_linux", default-features = false }
gpui_macos = { path = "vendor/gpui/crates/gpui_macos", default-features = false }
gpui_macros = { path = "vendor/gpui/crates/gpui_macros" }
gpui_platform = { path = "vendor/gpui/crates/gpui_platform", default-features = false }
gpui_shared_string = { path = "vendor/gpui/crates/gpui_shared_string" }
gpui_util = { path = "vendor/gpui/crates/gpui_util" }
gpui_web = { path = "vendor/gpui/crates/gpui_web" }
gpui_wgpu = { path = "vendor/gpui/crates/gpui_wgpu" }
gpui_windows = { path = "vendor/gpui/crates/gpui_windows", default-features = false }
hdrhistogram = "7"
heapless = "0.9.2"
heck = "0.5"
http = "1.1"
http-body = "1.0"
http_client = { path = "vendor/gpui/crates/http_client" }
http_client_tls = { path = "vendor/gpui/crates/http_client_tls" }
image = "0.25.1"
indexmap = { version = "2.7.0", features = ["serde"] }
interprocess = "2.4.2"
inventory = "0.3.19"
itertools = "0.14.0"
libc = "0.2"
log = { version = "0.4.16", features = ["kv_unstable_serde", "serde"] }
mach2 = "0.5"
media = { path = "vendor/gpui/crates/media" }
metal = "0.33"
nix = "0.29"
objc = "0.2"
objc2-app-kit = { version = "0.3", default-features = false, features = ["NSGraphics"] }
parking_lot = "0.12.1"
percent-encoding = "2.3.2"
perf = { path = "vendor/gpui/crates/perf" }
pollster = "0.4.0"
postage = { version = "0.5", features = ["futures-traits"] }
pretty_assertions = { version = "1.3.0", features = ["unstable"] }
proc-macro2 = "1.0.93"
profiling = "1"
proptest = { git = "https://github.com/proptest-rs/proptest", rev = "3dca198a8fef1b32e3a66f1e1897c955b4dc5b5b", features = ["attr-macro"] }
quote = "1.0.9"
rand = "0.9"
rayon = "1.8"
refineable = { path = "vendor/gpui/crates/refineable" }
regex = "1.5"
reqwest = { git = "https://github.com/zed-industries/reqwest.git", rev = "c15662463bda39148ba154100dd44d3fba5873a4", default-features = false, features = ["charset", "http2", "macos-system-configuration", "multipart", "rustls-tls-native-roots", "socks", "stream"], package = "zed-reqwest", version = "0.12.15-zed" }
reqwest_client = { path = "vendor/gpui/crates/reqwest_client" }
rust-embed = { version = "8.11", features = ["include-exclude"] }
rustc-hash = "2.1.0"
rustls = { version = "0.23.26" }
rustls-platform-verifier = "0.5.0"
scap = { git = "https://github.com/zed-industries/scap", rev = "4afea48c3b002197176fb19cd0f9b180dd36eaac", default-features = false, package = "zed-scap", version = "0.0.8-zed" }
scheduler = { path = "vendor/gpui/crates/scheduler" }
schemars = { version = "1.0", features = ["indexmap2"] }
semver = { version = "1.0", features = ["serde"] }
serde = { version = "1.0.221", features = ["derive", "rc"] }
serde_json = { version = "1.0.144", features = ["preserve_order", "raw_value"] }
serde_json_lenient = { version = "0.2", features = ["preserve_order", "raw_value"] }
serde_urlencoded = "0.7"
sha2 = "0.10"
shlex = "1.3.0"
slotmap = "1.0.6"
smallvec = { version = "1.6", features = ["union", "const_new"] }
smol = "2.0"
stacksafe = "0.1"
strum = { version = "0.27.2", features = ["derive"] }
sum_tree = { path = "vendor/gpui/crates/sum_tree" }
syn = { version = "2.0.101", features = ["full", "extra-traits", "visit-mut"] }
take-until = "0.2.0"
tempfile = "3.20.0"
thiserror = "2.0.12"
time = { version = "0.3", features = ["formatting", "macros", "parsing", "serde"] }
tokio = { version = "1.52.3", features = ["io-util", "macros", "net", "rt-multi-thread", "sync", "time"] }
tracing = "0.1.40"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
unicase = "2.6"
unicode-segmentation = "1.10"
url = "2.2"
util = { path = "vendor/gpui/crates/util" }
util_macros = { path = "vendor/gpui/crates/util_macros" }
uuid = { version = "1.1.2", features = ["v4", "v5", "v7", "serde"] }
walkdir = "2.5"
wasm-bindgen = "0.2.120"
webview2-com = "0.39.1"
web-time = "1.1.0"
wgpu = { git = "https://github.com/zed-industries/wgpu.git", rev = "a466bc382ea747f8e1ac810efdb6dcd49a514575" }
which = "6.0.0"
windows = { version = "0.61", features = ["Foundation_Numerics", "Globalization_DateTimeFormatting", "Storage_Search", "Storage_Streams", "System_Threading", "UI_ViewManagement", "Wdk_System_SystemServices", "Win32_Foundation", "Win32_Globalization", "Win32_Graphics_Direct3D", "Win32_Graphics_Direct3D11", "Win32_Graphics_Direct3D_Fxc", "Win32_Graphics_DirectComposition", "Win32_Graphics_DirectWrite", "Win32_Graphics_DirectManipulation", "Win32_Graphics_Dwm", "Win32_Graphics_Dxgi", "Win32_Graphics_Dxgi_Common", "Win32_Graphics_Gdi", "Win32_Graphics_Imaging", "Win32_Graphics_Hlsl", "Win32_Networking_WinSock", "Win32_Security", "Win32_Security_Credentials", "Win32_Security_Cryptography", "Win32_Storage_FileSystem", "Win32_System_Com", "Win32_System_Com_StructuredStorage", "Win32_System_Console", "Win32_System_Diagnostics_Debug", "Win32_System_DataExchange", "Win32_System_IO", "Win32_System_LibraryLoader", "Win32_System_Memory", "Win32_System_Ole", "Win32_System_Performance", "Win32_System_Pipes", "Win32_System_RestartManager", "Win32_System_SystemInformation", "Win32_System_SystemServices", "Win32_System_Threading", "Win32_System_Variant", "Win32_System_WinRT", "Win32_UI_Controls", "Win32_UI_HiDpi", "Win32_UI_Input_Ime", "Win32_UI_Input_KeyboardAndMouse", "Win32_UI_Input_Pointer", "Win32_UI_Shell", "Win32_UI_Shell_Common", "Win32_UI_Shell_PropertiesSystem", "Win32_UI_WindowsAndMessaging", "Win32_Media"] }
windows-core = "0.61"
zlog = { path = "vendor/gpui/crates/zlog" }
ztracing = { path = "vendor/gpui/crates/ztracing" }
ztracing_macro = { path = "vendor/gpui/crates/ztracing_macro" }

[workspace.lints.rust]
unexpected_cfgs = { level = "allow" }
